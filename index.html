        /* --- ngl this needs to get heavily redone --- */
        body {
            font-family: 'Verdana', sans-serif;
            background: #95A0A6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-box {
            max-width: 800px;
            width: 100%;
            background: #FBF3DE;
            border: outset #FBF3DE;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }
        .question-number {
            background: #1E3948;
            color: #FBF3DE;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: bold;
        }
        .question-text {
            font-size: 1.33rem;
            color: #1E3948;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: bold;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        .option-btn {
            background: #E2D9C3;
            border: 3.5px outset #E2D9C3;
            border-radius: 10px;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #1E3948;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background: #7D888A;
            border-color: #95A0A6;
        }
        .option-btn.correct {
            background: #5a9971;
            border-color: #3f6b4f;
            color: #3f6b4f;
        }
        .option-btn.incorrect {
            background: #a15252;
            border-color: #6e3737;
            color: #6e3737;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .explanation-box {
            background: #9aa3a8;
            border: outset #9aa3a8;
            border-left: 10px solid #5b6d79;
            padding: 20px;
            border-radius: 8px;
            margin: 25px 0;
            font-style: italic;
            color: #1e293b;
        }
        .next-btn {
            background: #0077b6;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            transition: background 0.2s;
        }
        .next-btn:hover:not(:disabled) {
            background: #023047;
        }
        .next-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .score-box {
            text-align: center;
            padding: 40px;
        }
        .score-box h2 {
            color: #023047;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .restart-btn {
            background: #0077b6;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>

        let currentQuestionIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let answerSelected = false;

        const quizContainer = document.getElementById('quizContainer');

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }

            const q = questions[currentQuestionIndex];
            const isAnswered = userAnswers[currentQuestionIndex] !== null;
            const selectedIdx = userAnswers[currentQuestionIndex];
            
            let optionsHtml = '';
            for (let i = 0; i < q.options.length; i++) {
                let btnClass = 'option-btn';
                if (isAnswered) {
                    if (i === q.correct) btnClass += ' correct';
                    else if (i === selectedIdx && i !== q.correct) btnClass += ' incorrect';
                }
                optionsHtml += `<button class="${btnClass}" onclick="selectAnswer(${i})" ${isAnswered ? 'disabled' : ''}>${q.options[i]}</button>`;
            }

            const explanationHtml = isAnswered 
                ? `<div class="explanation-box">📘 <strong>Explanation:</strong> ${q.explanation}</div>` 
                : '';

            const nextButtonDisabled = !isAnswered ? 'disabled' : '';

            quizContainer.innerHTML = `
                <div class="header">
                    <span class="question-number">Question ${currentQuestionIndex + 1} of ${questions.length}</span>
                    <span>🧑‍⚕️ UKMLA SBA</span>
                </div>
                <div class="question-text">${q.question}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${explanationHtml}
                <div class="clearfix">
                    <button class="next-btn" onclick="nextQuestion()" ${nextButtonDisabled}>Next →</button>
                </div>
            `;
            answerSelected = isAnswered;
        }

        window.selectAnswer = function(selectedIndex) {
            if (userAnswers[currentQuestionIndex] !== null) return; // Already answered
            
            userAnswers[currentQuestionIndex] = selectedIndex;
            answerSelected = true;
            
            // Re-load the question to show correct/incorrect colors and explanation
            loadQuestion();
        }

        window.nextQuestion = function() {
            if (userAnswers[currentQuestionIndex] === null) return; // No answer selected
            currentQuestionIndex++;
            loadQuestion();
        }

        function showResults() {
            let correctCount = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === questions[i].correct) correctCount++;
            }
            const percentage = Math.round((correctCount / questions.length) * 100);
            
            quizContainer.innerHTML = `
                <div class="score-box">
                    <h2>🎉 Quiz Complete!</h2>
                    <p style="font-size: 1.2rem; margin: 20px 0;">You scored <strong>${correctCount}</strong> out of <strong>${questions.length}</strong></p>
                    <div style="background: #e9ecef; height: 25px; width: 100%; border-radius: 30px; margin: 20px 0; overflow: hidden;">
                        <div style="background: #0077b6; width: ${percentage}%; height: 100%;"></div>
                    </div>
                    <p style="font-size: 1.5rem; font-weight: bold; color: #023047;">${percentage}%</p>
                    <button class="restart-btn" onclick="restartQuiz()">🔄 Try Again</button>
                </div>
            `;
        }

        window.restartQuiz = function() {
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            loadQuestion();
        }

        // Start the quiz
        loadQuestion();
    </script>

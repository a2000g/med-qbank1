</head>

    <script>
        const QUIZ_NAME = 'mock2026';
        
        const questions = [
            {
                id: 0,
                question: "Based on previous research evidence, which of the following mental health disorders is considered a risk factor for cardiac mortality in patients with Coronary Heart Disease (CHD)?",

                explanation: "Correct Answer: 3 (57.3% got this correct)\n\nDepression is an independent risk factor for increased mortality in patients with Coronary Heart Disease (CHD).\n\nClinical Impact:\nIncreased risk of recurrent myocardial infarction\nIncreased hospital readmissions\nIncreased all-cause and cardiac mortality\n\nTake-Home Message:\nScreening and managing depression is an important component of secondary prevention in CHD."

            {

            {

            {
                id: 3,
                question: "An 85-year-old man with end-stage COPD is admitted with pneumonia. The team believes CPR would not be appropriate due to multi-organ failure. He lacks capacity due to delirium. There is no advance decision or lasting power of attorney. What is the most appropriate action?",

            },
            {

                ],
                correct: 0,
                explanation: "Correct Answer: 1 (96.2% got this correct)\n\nBeneficence: The duty of healthcare professionals to act in the patient's best interests and promote wellbeing.\nNon-Maleficence: The duty to avoid causing harm.\nVeracity: The duty to tell the truth and provide honest information to patients."
            },
            {
                id: 5,
                question: "A patient with chronic asthma who is prescribed atenolol experiences shortness of breath and wheezing. Which is the most likely mechanism for the adverse drug reactions to explain the clinical problem?",

            {

            },
            {
                id: 7,
                question: "Which of the following receptors is activated by the post-ganglionic fibres of the sympathetic nervous system?",

                    "Beta adrenergic receptors",
                    "GABA receptors",
                    "Glutamate receptors",
                    "Muscarinic receptors",
                    "Nicotinic acetylcholine receptors"

                correct: 0,
                explanation: "Correct Answer: 1\n\nIn the sympathetic nervous system (SNS):\nPreganglionic fibres release acetylcholine (ACh) → act on nicotinic receptors in the ganglion.\nPostganglionic fibres usually release noradrenaline (norepinephrine).\nNoradrenaline acts on adrenergic receptors (alpha and beta receptors) at target organs\n\nExam Tip\nSympathetic target organs → think adrenergic receptors\n(Exception: Sweat glands use muscarinic receptors.)"

            {

            {

        localStorage.setItem('mock2026_questions', JSON.stringify(questions.map(q => ({
            id: q.id,
            question: q.question,
            options: q.options,
            explanation: q.explanation
        }))));

        function showConfirmationModal(onConfirm) {
            const modal = document.getElementById('confirmationModal');
            const confirmBtn = document.getElementById('modalConfirmBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');
            
            const newConfirmBtn = confirmBtn.cloneNode(true);
            const newCancelBtn = cancelBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
            cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
            
            newConfirmBtn.addEventListener('click', () => {
                modal.style.display = 'none';
                onConfirm();
            });
            
            newCancelBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });
            
            modal.style.display = 'flex';
        }
        
        function showSuccessModal(message, onOk) {
            const modal = document.getElementById('successModal');
            const successMessage = document.getElementById('successMessage');
            const okBtn = document.getElementById('successOkBtn');
            
            successMessage.textContent = message;
            
            const newOkBtn = okBtn.cloneNode(true);
            okBtn.parentNode.replaceChild(newOkBtn, okBtn);
            
            newOkBtn.addEventListener('click', () => {
                modal.style.display = 'none';
                if (onOk) onOk();
            });
            
            modal.style.display = 'flex';
        }

        function getStoredProgress() {
            const progress = localStorage.getItem(`quiz_progress_${QUIZ_NAME}`);
            if (progress) {
                return JSON.parse(progress);
            }
            return {
                bestScore: 0,
                lastScore: 0,
                attempts: 0,
                lastDate: null,
                answers: new Array(questions.length).fill(null)
            };
        }
        
        function saveProgress(progress) {
            localStorage.setItem(`quiz_progress_${QUIZ_NAME}`, JSON.stringify(progress));
        }
        
        function updateProgressOnComplete(correctCount, totalQuestions) {
            const percentage = Math.round((correctCount / totalQuestions) * 100);
            const progress = getStoredProgress();
            
            progress.attempts++;
            progress.lastScore = percentage;
            progress.lastDate = new Date().toISOString();
            
            if (percentage > progress.bestScore) {
                progress.bestScore = percentage;
            }
            
            saveProgress(progress);
            return progress;
        }
        
        function resetQuizOnly() {
            showConfirmationModal(() => {
                userAnswers = new Array(questions.length).fill(null);
                currentQuestionIndex = 0;
                const progress = getStoredProgress();
                progress.answers = userAnswers;
                saveProgress(progress);
                loadQuestion();
                showSuccessModal('Your answers have been cleared. You can now retake the quiz.', null);
            });
        }
        
        function clearAllProgress() {
            showConfirmationModal(() => {
                localStorage.removeItem(`quiz_progress_${QUIZ_NAME}`);
                userAnswers = new Array(questions.length).fill(null);
                currentQuestionIndex = 0;
                const progress = getStoredProgress();
                progress.answers = userAnswers;
                saveProgress(progress);
                loadQuestion();
                showSuccessModal('All progress has been cleared. The quiz has been reset.', null);
            });
        }

        let currentQuestionIndex = 0;
        let userAnswers = getStoredProgress().answers || new Array(questions.length).fill(null);
        let answerSelected = false;

        const quizContainer = document.getElementById('quizContainer');

        const jumpToQuestion = localStorage.getItem('mock2026_jumpToQuestion');
        if (jumpToQuestion !== null) {
            currentQuestionIndex = parseInt(jumpToQuestion);
            localStorage.removeItem('mock2026_jumpToQuestion');
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }

            const q = questions[currentQuestionIndex];
            const isAnswered = userAnswers[currentQuestionIndex] !== null;
            const selectedIdx = userAnswers[currentQuestionIndex];
            
            let optionsHtml = '';
            for (let i = 0; i < q.options.length; i++) {
                let btnClass = 'option-btn';
                if (isAnswered) {
                    if (i === q.correct) btnClass += ' correct';
                    else if (i === selectedIdx && i !== q.correct) btnClass += ' incorrect';
                }
                optionsHtml += `<button class="${btnClass}" onclick="selectAnswer(${i})" ${isAnswered ? 'disabled' : ''}>${q.options[i]}</button>`;
            }

            const explanationHtml = isAnswered 
                ? `<div class="explanation-box">EXPLANATION:\n\n${q.explanation}</div>` 
                : '';

            const progress = getStoredProgress();
            
            quizContainer.innerHTML = `
                <div class="header">
                    <span class="question-number">Question ${currentQuestionIndex + 1} of ${questions.length}</span>
                    <span class="progress-stats">BEST: ${progress.bestScore}%</span>
                    <span class="search-nav" onclick="goToHomepage()">SEARCH QUESTIONS</span>
                    <button class="reset-quiz-btn" onclick="resetQuizOnly()">RESET ANSWERS</button>
                </div>
                <div class="question-text">${q.question}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${explanationHtml}
                <div class="navigation-buttons">
                    <button class="prev-btn" onclick="prevQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>PREVIOUS</button>
                    <div class="question-jumper">
                        <input type="number" id="questionJump" min="1" max="${questions.length}" value="${currentQuestionIndex + 1}">
                        <button class="jump-btn" onclick="jumpToQuestion()">GO</button>
                    </div>
                    <button class="next-btn" onclick="nextQuestion()">${currentQuestionIndex === questions.length - 1 ? 'FINISH' : 'NEXT'}</button>
                </div>
            `;
            answerSelected = isAnswered;
        }

        window.selectAnswer = function(selectedIndex) {
            if (userAnswers[currentQuestionIndex] !== null) return;
            
            userAnswers[currentQuestionIndex] = selectedIndex;
            answerSelected = true;
            
            const progress = getStoredProgress();
            progress.answers = userAnswers;
            saveProgress(progress);
            
            loadQuestion();
        }

        window.nextQuestion = function() {
            if (userAnswers[currentQuestionIndex] === null && currentQuestionIndex < questions.length) {
                alert('Please select an answer before continuing.');
                return;
            }
            
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else if (currentQuestionIndex === questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            }
        }

        window.prevQuestion = function() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }
        
        window.jumpToQuestion = function() {
            const jumpValue = parseInt(document.getElementById('questionJump').value);
            if (jumpValue >= 1 && jumpValue <= questions.length) {
                currentQuestionIndex = jumpValue - 1;
                loadQuestion();
            } else {
                alert(`Please enter a number between 1 and ${questions.length}`);
            }
        }
        
        window.goToHomepage = function() {
            const progress = getStoredProgress();
            progress.answers = userAnswers;
            saveProgress(progress);
            window.location.href = 'home.html';
        }
        
        window.resetQuizOnly = resetQuizOnly;
        window.clearAllProgress = clearAllProgress;

        function showResults() {
            let correctCount = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === questions[i].correct) correctCount++;
            }
            const percentage = Math.round((correctCount / questions.length) * 100);
            
            const progress = updateProgressOnComplete(correctCount, questions.length);
            
            let detailedResults = '';
            for (let i = 0; i < questions.length; i++) {
                const isCorrect = userAnswers[i] === questions[i].correct;
                const statusEmoji = isCorrect ? '✓' : '✗';
                detailedResults += `
                    <div style="padding: 10px; margin: 5px 0; background: ${isCorrect ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; border-radius: 8px; border-left: 3px solid ${isCorrect ? '#22c55e' : '#ef4444'};">
                        <strong>${statusEmoji} Question ${i + 1}:</strong> ${questions[i].question.substring(0, 100)}...
                        ${!isCorrect ? `<br><span style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.5);">Correct answer: ${questions[i].options[questions[i].correct]}</span>` : ''}
                    </div>
                `;
            }
            
            quizContainer.innerHTML = `
                <div class="score-box">
                    <h2>MOCK BLOCK COMPLETE</h2>
                    <p style="font-size: 1.2rem; margin: 20px 0; color: rgba(255, 255, 255, 0.8);">You scored <strong style="color: #00aaff;">${correctCount}</strong> out of <strong style="color: #00aaff;">${questions.length}</strong></p>
                    <div style="background: rgba(255, 255, 255, 0.1); height: 25px; width: 100%; border-radius: 30px; margin: 20px 0; overflow: hidden;">
                        <div style="background: #00aaff; width: ${percentage}%; height: 100%; box-shadow: 0 0 10px #00aaff;"></div>
                    </div>
                    <p style="font-size: 1.5rem; font-weight: bold; color: #00aaff;">${percentage}%</p>
                    <div class="personal-best">
                        <strong>YOUR PROGRESS</strong><br>
                        BEST SCORE: ${progress.bestScore}%<br>
                        THIS SCORE: ${percentage}%<br>
                        ATTEMPTS: ${progress.attempts}<br>
                        ${percentage > progress.bestScore && progress.attempts > 1 ? '<br>NEW PERSONAL BEST' : ''}
                    </div>
                    <details style="margin: 20px 0; text-align: left;">
                        <summary style="cursor: pointer; color: #00aaff; font-weight: bold;">VIEW DETAILED RESULTS</summary>
                        <div style="margin-top: 15px; max-height: 400px; overflow-y: auto;">
                            ${detailedResults}
                        </div>
                    </details>
                    <div style="margin-top: 30px;">
                        <button class="restart-btn" onclick="restartQuiz()">TRY AGAIN</button>
                        <a href="home.html" class="back-home">BACK TO HOME</a>
                        <button class="clear-progress-btn" onclick="clearAllProgress()">DELETE ALL PROGRESS</button>
                    </div>
                </div>
            `;
        }

        window.restartQuiz = function() {
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            const progress = getStoredProgress();
            progress.answers = userAnswers;
            saveProgress(progress);
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
